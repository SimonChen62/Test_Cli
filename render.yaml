services:
  - type: web
    name: callilens
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: DATABASE_URL
        fromDatabase:
          name: callilens-db
          property: connectionString

databases:
  - name: callilens-db
    databaseName: callilens
    user: callilens
