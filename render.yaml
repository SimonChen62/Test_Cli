services:
  - type: web
    name: callilens
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: CALLILENS_LLM_ENABLED
        value: false
