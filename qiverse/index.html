<!doctype html>

  <body>
    <main class="cinemaShell">
      <canvas id="qiverseCanvas" aria-label="QiVerse &#x58a8;&#x6c14;&#x661f;&#x6cb3;&#x52a8;&#x753b;"></canvas>

      <a class="backLink" href="../web/">&#x8fd4;&#x56de; CalliLens</a>
      <button id="xrButton" class="xrButton" type="button">Desktop</button>

      <section id="launchPanel" class="launchPanel" aria-label="&#x5f00;&#x59cb;&#x4f53;&#x9a8c;">
        <p class="eyebrow">QiVerse cinematic prototype</p>
        <h1>&#x58a8;&#x6c14;&#x661f;&#x6cb3;</h1>
        <p class="launchCopy">
          &#x4e0d;&#x518d;&#x663e;&#x793a;&#x7eb8;&#x9762;&#x80cc;&#x666f;&#xff0c;&#x4e5f;&#x4e0d;&#x8d34;&#x539f;&#x56fe;&#x3002;
          &#x7cfb;&#x7edf;&#x76f4;&#x63a5;&#x8bfb;&#x53d6;&#x6574;&#x5377;&#x58a8;&#x8ff9;&#x9ad8;&#x5ea6;&#x56fe;&#xff0c;&#x8ba9;&#x661f;&#x70b9;&#x7ec4;&#x6210;&#x6bcf;&#x4e00;&#x4e2a;&#x5b57;&#x3002;
          &#x955c;&#x5934;&#x5728;&#x661f;&#x5b57;&#x957f;&#x5377;&#x4e2d;&#x7a7f;&#x884c;&#xff0c;&#x901a;&#x8fc7;&#x7c92;&#x5b50;&#x6d41;&#x52a8;&#x548c;&#x5b57;&#x95f4;&#x6697;&#x5904;&#x8868;&#x73b0;&#x8d8b;&#x52bf;&#x4e0e;&#x7559;&#x767d;&#x3002;
        </p>
        <div class="inkAwakeningPrompt">
          <span>&#x8fd9;&#x4e00;&#x7b14;&#xff0c;&#x66fe;&#x7ecf;&#x662f;&#x4e00;&#x4e2a;&#x52a8;&#x4f5c;&#x3002;</span>
          <small>靠近作品，进入墨迹的空间结构。</small>
        </div>
        <button id="startButton" class="startButton" type="button">&#x8fdb;&#x5165;&#x58a8;&#x8ff9; / ENTER THE INK</button>
      </section>

      <section class="captionPanel" aria-live="polite">
        <p id="sceneKicker" class="sceneKicker">Scene 0</p>
        <h2 id="sceneTitle">Silence / &#x9759;&#x58a8;</h2>
        <p id="sceneText">&#x9760;&#x8fd1;&#x4e4b;&#x524d;&#xff0c;&#x58a8;&#x53ea;&#x662f;&#x8fdc;&#x5904;&#x7684;&#x661f;&#x5c18;&#x3002;</p>
      </section>

      <div class="timeline" aria-label="&#x4f53;&#x9a8c;&#x7ae0;&#x8282;">
        <button class="chapter active" type="button" data-scene="galaxy">&#x661f;&#x5c18;</button>
        <button class="chapter" type="button" data-scene="assemble">&#x6210;&#x5b57;</button>
        <button class="chapter" type="button" data-scene="enter">&#x5165;&#x58a8;</button>
        <button class="chapter" type="button" data-scene="ride">&#x6e38;&#x5377;</button>
        <button class="chapter" type="button" data-scene="qi">&#x8ffd;&#x52bf;</button>
        <button class="chapter" type="button" data-scene="void">&#x5165;&#x767d;</button>
        <button class="chapter" type="button" data-scene="return">&#x56de;&#x770b;</button>
      </div>

      <aside class="pathPanel" aria-label="&#x5165;&#x58a8;&#x7b14;&#x753b;&#x8def;&#x5f84;&#x8c03;&#x8282;">
        <p class="pathPanelEyebrow">&#x5165;&#x58a8;&#x8def;&#x5f84;</p>
        <div class="selectedStrokeCard">
          <span>当前调整</span>
          <strong id="selectedStrokeName">全部笔画</strong>
          <button id="clearStrokeSelectionButton" type="button">取消选择</button>
        </div>
        <label class="pathControl" for="pathWidthSlider">
          <span>&#x7c97;&#x7ec6;</span>
          <small>&#x5de6;&#x7c97; / &#x53f3;&#x7ec6;</small>
          <input id="pathWidthSlider" class="reverseRange" type="range" min="0.018" max="0.16" step="0.004" value="0.062" />
        </label>
        <label class="pathControl" for="pathOpacitySlider">
          <span>&#x6d53;&#x6de1;</span>
          <small>&#x5de6;&#x6d53; / &#x53f3;&#x6de1;</small>
          <input id="pathOpacitySlider" class="reverseRange" type="range" min="0.12" max="1" step="0.02" value="0.82" />
        </label>
      </aside>

      <div id="ridePrompt" class="ridePrompt hidden" aria-live="polite"></div>
      <button id="rideStartButton" class="rideStartButton hidden" type="button">RIDE</button>
      <div id="qiPrompt" class="qiPrompt hidden" aria-live="polite"></div>

      <div class="controlStrip">
        <button id="qiStartButton" class="hidden" type="button">FOLLOW THE QI</button>
        <button id="playButton" type="button">&#x64ad;&#x653e;&#x5b8c;&#x6574;&#x65c5;&#x7a0b;</button>
        <button id="pauseButton" type="button">&#x6682;&#x505c;</button>
        <button id="resetButton" type="button">&#x91cd;&#x7f6e;</button>
        <button id="exportButton" type="button">导出体验 JSON</button>
      </div>
    </main>
    <script type="module" charset="utf-8" src="./qiverse.js?v=44"></script>
