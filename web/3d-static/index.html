<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CalliLens 静态 3D 字形</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #11100d;
        color: #fff8ec;
        font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      }
      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        min-height: 100vh;
      }
      .stage { position: relative; min-width: 0; }
      canvas { display: block; width: 100%; height: 100vh; cursor: grab; }
      canvas:active { cursor: grabbing; }
      aside {
        padding: 28px 24px;
        border-left: 1px solid rgba(234, 223, 201, 0.16);
        background: rgba(12, 11, 9, 0.92);
      }
      .eyebrow {
        margin: 0 0 8px;
        color: #b8ad99;
        font-size: 12px;
      }
      h1 {
        margin: 0 0 18px;
        font-size: 30px;
        line-height: 1.12;
      }
      .card {
        margin: 0 0 14px;
        padding: 14px;
        border: 1px solid rgba(234, 223, 201, 0.16);
        border-radius: 8px;
        background: rgba(255, 249, 236, 0.07);
      }
      .card p {
        margin: 0;
        color: rgba(255, 248, 236, 0.78);
        font-size: 13px;
        line-height: 1.7;
      }
      .glyphs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      button {
        min-height: 48px;
        border: 1px solid rgba(234, 223, 201, 0.2);
        border-radius: 7px;
        background: rgba(255, 249, 236, 0.08);
        color: #fff8ec;
        font: inherit;
        cursor: pointer;
      }
      button.active, button:hover {
        border-color: rgba(163, 58, 44, 0.78);
        background: #a33a2c;
      }
      .metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .metrics strong { display: block; font-size: 22px; }
      .metrics span { color: #b8ad99; font-size: 12px; }
      .hint {
        position: absolute;
        left: 24px;
        bottom: 22px;
        padding: 8px 10px;
        border: 1px solid rgba(234, 223, 201, 0.14);
        border-radius: 7px;
        background: rgba(12, 11, 9, 0.62);
        color: rgba(255, 248, 236, 0.72);
        font-size: 12px;
      }
      #error {
        position: fixed;
        left: 24px;
        top: 24px;
        max-width: 520px;
        padding: 14px;
        border: 1px solid rgba(163, 58, 44, 0.7);
        border-radius: 8px;
        background: rgba(12, 11, 9, 0.9);
      }
      @media (max-width: 900px) {
        main { grid-template-columns: 1fr; }
        canvas { height: 68vh; }
        aside { border-left: 0; border-top: 1px solid rgba(234, 223, 201, 0.16); }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="stage">
        <canvas id="scene"></canvas>
        <div class="hint">拖拽旋转视角；厚笔画由 height map 形成更深的三维起伏。</div>
        <div id="error" hidden></div>
      </section>
      <aside>
        <p class="eyebrow">CalliLens / OpenCV mask + height map + Three.js</p>
        <h1>静态 3D 字形浮雕</h1>
        <section class="card">
          <p id="summary">从题名区大字提取墨迹 mask 和距离变换 height map，在 Three.js 中生成静态三维浮雕。当前不声明真实笔顺。</p>
          <div id="glyphButtons" class="glyphs"></div>
        </section>
        <section class="card metrics">
          <div><span>当前字形</span><strong id="glyphLabel">--</strong></div>
          <div><span>ROI像素</span><strong id="contourCount">--</strong></div>
        </section>
        <section class="card">
          <p>技术边界：PaddleOCR 可作为候选检测工具，但复杂行草书的精确单字边界和真实笔顺恢复仍需要专门模型或人工校正。这里展示的是“字形墨迹实体化”的静态 3D 原型。</p>
        </section>
      </aside>
    </main>
    <script type="module" src="./main.js?v=2"></script>
  </body>
</html>
