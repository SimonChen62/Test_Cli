<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CalliLens</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage">
        <header class="topbar">
          <div>
            <p class="eyebrow">CalliLens</p>
            <h1 id="workTitle">单作品书法导览</h1>
          </div>
          <button id="speakButton" class="iconButton" type="button" title="播放语音导览" aria-label="播放语音导览">
            ▶
          </button>
        </header>

        <div class="toolbar" aria-label="模式切换">
          <button class="modeButton active" data-mode="original" type="button">原作</button>
          <button class="modeButton" data-mode="layers" type="button">图层</button>
          <button class="modeButton" data-mode="qi_flow" type="button">气脉</button>
          <button class="modeButton" data-mode="void_solid" type="button">虚实</button>
          <button class="modeButton" data-mode="brush_ink" type="button">笔墨</button>
        </div>

        <div id="layerPicker" class="layerPicker" aria-label="OpenCV 图层">
          <button class="layerButton active" data-layer="original" type="button">原图</button>
          <button class="layerButton" data-layer="binary" type="button">黑白</button>
          <button class="layerButton" data-layer="skeleton" type="button">骨架</button>
          <button class="layerButton" data-layer="strokeWidth" type="button">粗细</button>
          <button class="layerButton" data-layer="inkDensity" type="button">墨色</button>
          <button class="layerButton" data-layer="voidCandidates" type="button">留白</button>
        </div>

        <div class="canvasShell">
          <img id="workImage" alt="书法作品或辅助分析图" />
          <svg id="overlay" viewBox="0 0 100 100" preserveAspectRatio="none" aria-label="人工标注覆盖层"></svg>
          <div id="imageFallback" class="fallback" hidden>
            请先放入 <code>data/work_001/original.png</code>，再运行 OpenCV 脚本生成辅助图。
          </div>
        </div>
      </section>

      <aside class="panel">
        <p class="eyebrow">解释面板</p>
        <h2 id="annotationTitle">选择一个标注</h2>
        <dl>
          <dt>形式描述</dt>
          <dd id="formalText">点击图中的路径或区域，查看人工解释。</dd>
          <dt>感知经验</dt>
          <dd id="perceptionText">这里会显示普通观众可能产生的观看感受。</dd>
          <dt>美学解释</dt>
          <dd id="aestheticText">这里会说明该观察如何帮助理解气脉、虚实或笔墨节奏。</dd>
        </dl>
        <div class="note">
          OpenCV 只提供视觉证据；气脉、虚实和笔墨解释来自人工标注。
        </div>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
