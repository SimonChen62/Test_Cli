<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CalliLens | 书法数字导览</title>
    <link rel="stylesheet" href="./styles.css?v=30" />
  </head>
  <body>
    <header class="appHeader">
      <div>
        <p class="eyebrow">CalliLens</p>
        <h1>赵孟頫《光福重建塔记》数字导览</h1>
      </div>
      <nav class="topNav" aria-label="主要功能">
        <button type="button" data-view="gallery" class="navButton active">作品</button>
        <button type="button" data-view="ask" class="navButton">问答</button>
        <button type="button" data-view="admin" class="navButton">管理员上传</button>
      </nav>
    </header>

    <main class="workspace">
      <section class="viewerPanel" aria-label="作品展示">
        <div class="viewerToolbar">
          <div>
            <p id="workMeta" class="eyebrow">元代 · 行书 · 上海博物馆</p>
            <h2 id="workTitle">赵孟頫《光福重建塔记》</h2>
          </div>
          <div class="modeTabs" aria-label="展示模式">
            <button type="button" id="imageModeButton" class="modeButton active">原图</button>
            <button type="button" id="threeModeButton" class="modeButton">悬浮 3D</button>
          </div>
        </div>

        <div class="stage" id="stage">
          <img id="workImage" class="workImage" alt="赵孟頫《光福重建塔记》作品图" />
          <canvas id="threeCanvas" class="threeCanvas" hidden></canvas>
          <div id="stageStatus" class="stageStatus" hidden></div>
        </div>

        <div id="threeControls" class="threeControls" hidden aria-label="3D 控制">
          <button type="button" id="zoomOutButton" title="缩小">-</button>
          <button type="button" id="zoomInButton" title="放大">+</button>
          <label class="panControl">
            <span>水平移动</span>
            <input id="panSlider" type="range" min="-100" max="100" value="0" />
          </label>
          <button type="button" id="frontButton">正面</button>
          <button type="button" id="sideButton">侧面</button>
          <button type="button" id="resetButton">重置</button>
        </div>
      </section>

      <aside class="infoPanel" aria-label="导览信息">
        <section class="card" data-panel="gallery">
          <p class="eyebrow">作品说明</p>
          <h2>悬浮墨迹，而不是书法评分</h2>
          <p id="workDescription">
            本系统把可见墨迹深浅转换为 3D 高度，用于辅助观察墨迹厚薄、飞白和长卷节奏，不恢复真实笔顺，也不判断书法水平。
          </p>
          <dl class="factList">
            <div><dt>作者</dt><dd id="factArtist">赵孟頫</dd></div>
            <div><dt>年代</dt><dd id="factDate">至治元年（1321）</dd></div>
            <div><dt>书体</dt><dd id="factScript">行书</dd></div>
            <div><dt>馆藏</dt><dd id="factMuseum">上海博物馆</dd></div>
          </dl>
          <p class="sourceLine">
            主要事实源：
            <a id="sourceLink" href="https://www.shanghaimuseum.net/mu/frontend/pg/m/article/id/CI00000601" target="_blank" rel="noreferrer">上海博物馆</a>
          </p>
        </section>

        <section class="card askPanel" data-panel="ask" hidden>
          <p class="eyebrow">本地 RAG</p>
          <h2>有来源的作品问答</h2>
          <div class="questionGrid" id="questionGrid">
            <button type="button">赵孟頫是谁？</button>
            <button type="button">《光福重建塔记》是什么？</button>
            <button type="button">为什么要做悬浮 3D？</button>
            <button type="button">什么是飞白？</button>
            <button type="button">为什么需要 RAG？</button>
            <button type="button">没有 API key 能不能运行？</button>
          </div>
          <label class="askBox">
            <span>输入问题</span>
            <textarea id="questionInput" rows="4" placeholder="例如：这个 3D 是怎么实现的？"></textarea>
          </label>
          <label class="toggleLine">
            <input id="useLlmInput" type="checkbox" />
            <span>使用管理员配置的 AI 润色答案</span>
          </label>
          <button id="askButton" class="primaryButton" type="button">检索并回答</button>
          <div id="answerBox" class="answerBox" hidden></div>
          <div id="sourceBox" class="sourceBox" hidden></div>
        </section>

        <section class="card adminPanel" data-panel="admin" hidden>
          <p class="eyebrow">管理员上传</p>
          <h2>上传作品并加入知识库</h2>
          <section class="llmConfig">
            <h3>AI 接入配置</h3>
            <p id="llmStatus">正在读取配置...</p>
            <form id="llmForm" class="uploadForm">
              <label>
                <span>提供商</span>
                <select name="provider">
                  <option value="openrouter">OpenRouter 免费路由</option>
                  <option value="gemini">Gemini API</option>
                  <option value="custom">自定义 OpenAI 兼容接口</option>
                </select>
              </label>
              <label><span>API key</span><input name="api_key" type="password" placeholder="只保存在本机 .env.local" /></label>
              <label><span>模型</span><input name="model" placeholder="默认 openrouter/free 或 gemini-2.5-flash" /></label>
              <label><span>接口地址</span><input name="base_url" placeholder="通常不用填" /></label>
              <button class="primaryButton" type="submit">保存 AI 配置</button>
            </form>
          </section>
          <form id="uploadForm" class="uploadForm">
            <label>
              <span>作品图片</span>
              <input name="image" type="file" accept="image/*" required />
            </label>
            <label><span>作品名称</span><input name="title" required placeholder="例如：某某行书卷" /></label>
            <label><span>作者</span><input name="artist" placeholder="作者姓名" /></label>
            <label><span>朝代</span><input name="dynasty" placeholder="例如：元代" /></label>
            <label><span>创作时间</span><input name="date" placeholder="例如：至治元年（1321）" /></label>
            <label><span>书体</span><input name="script_type" placeholder="例如：行书" /></label>
            <label><span>馆藏地</span><input name="museum" placeholder="例如：上海博物馆" /></label>
            <label><span>作品简介</span><textarea name="description" rows="3" required></textarea></label>
            <label><span>历史背景</span><textarea name="background" rows="3"></textarea></label>
            <label><span>资料来源 URL</span><input name="source_url" type="url" placeholder="https://..." /></label>
            <label><span>关键词</span><input name="tags" placeholder="用英文逗号分隔，例如：行书,长卷" /></label>
            <button class="primaryButton" type="submit">上传并处理</button>
          </form>
          <div id="uploadResult" class="uploadResult" hidden></div>
        </section>
      </aside>
    </main>

    <script type="module" src="./app.js?v=30"></script>
  </body>
</html>
